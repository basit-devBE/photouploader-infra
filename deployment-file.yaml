template-file-path: root-stack.yaml
parameters:
  ProjectName: photouploader
  TemplatesBucketName: photouploader-infra-templates-eu-central-1-124355645722
  GitHubOidcProviderArn: arn:aws:iam::124355645722:oidc-provider/token.actions.githubusercontent.com
  GitHubOrg: basit-devBE
  GitHubAppRepo: photouploader-app
  GitHubBranch: main
  DBInstanceClass: db.t3.micro
  DBName: photouploader
  # Phase 1 (this state): deploys network/security/storage/database/ecr/iam
  # only, creating the (empty) photouploader ECR repo.
  #
  # Phase 2: once the app repo's GitHub Actions workflow has pushed a real
  # image tagged :latest to that repo, set DeployCompute to 'true' and push
  # again to add compute/autoscaling/cicd. The image URI is computed
  # automatically from the ECR repo's own URI + ":latest" - nothing else to
  # set. From then on CodeDeploy manages the running image via blue/green.
  DeployCompute: 'false'
capabilities:
- CAPABILITY_NAMED_IAM
- CAPABILITY_AUTO_EXPAND
tags:
  Project: photouploader
  ManagedBy: CloudFormation-GitSync
