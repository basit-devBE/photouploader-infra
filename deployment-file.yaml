  # blue/green deploys - this parameter is not touched again after this.
  DeployCompute: 'true'
  AppImageUri: 124355645722.dkr.ecr.eu-central-1.amazonaws.com/photouploader:32d1377964ab93225df2492b57b87748670408cf
capabilities:
- CAPABILITY_NAMED_IAM
- CAPABILITY_AUTO_EXPAND
tags:
  Project: photouploader
  ManagedBy: CloudFormation-GitSync
