AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Photo Uploader - IAM roles: a GitHub Actions role authenticated via an
  existing OIDC provider (no long-lived credentials), and the ECS task
  execution/task roles the app container runs as.

Parameters:
  ProjectName:
    Type: String
    Default: photouploader

  GitHubOidcProviderArn:
    Type: String
    Description: ARN of the existing GitHub Actions OIDC provider in this account

  GitHubOrg:
    Type: String
    Default: basit-devBE

  GitHubAppRepo:
    Type: String
    Default: photouploader-app

  GitHubBranch:
    Type: String
    Default: main

  EcrRepositoryArn:
    Type: String

  DBSecretArn:
    Type: String

  ImageBucketArn:
    Type: String

Resources:
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-github-actions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubAppRepo}:ref:refs/heads/${GitHubBranch}
      Policies:
        - PolicyName: EcrPush
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EcrAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: EcrPushToRepo
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !Ref EcrRepositoryArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ecs-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DBSecretArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ecs-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ImageAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub ${ImageBucketArn}/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Ref ImageBucketArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn

  EcsTaskExecutionRoleArn:
    Value: !GetAtt EcsTaskExecutionRole.Arn

  EcsTaskRoleArn:
    Value: !GetAtt EcsTaskRole.Arn
