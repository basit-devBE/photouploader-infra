AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Photo Uploader - Application Auto Scaling for the ECS service, min 1 /
  desired 1 / max 4 tasks, scaling on average CPU utilization.

Parameters:
  ProjectName:
    Type: String
    Default: photouploader

  ClusterName:
    Type: String

  ServiceName:
    Type: String

  MinCapacity:
    Type: Number
    Default: 1

  MaxCapacity:
    Type: Number
    Default: 4

  TargetCpuUtilization:
    Type: Number
    Default: 70

Resources:
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ResourceId: !Sub service/${ClusterName}/${ServiceName}
      ScalableDimension: ecs:service:DesiredCount
      MinCapacity: !Ref MinCapacity
      MaxCapacity: !Ref MaxCapacity

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${ProjectName}-cpu-target-tracking
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: !Ref TargetCpuUtilization
        ScaleOutCooldown: 60
        ScaleInCooldown: 300
