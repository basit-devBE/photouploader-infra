AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Photo Uploader - ECR repository for the application container image.

Parameters:
  ProjectName:
    Type: String
    Default: photouploader

Resources:
  AppRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ProjectName
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 1 day",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 1
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  RepositoryName:
    Value: !Ref AppRepository

  RepositoryArn:
    Value: !GetAtt AppRepository.Arn

  RepositoryUri:
    Value: !GetAtt AppRepository.RepositoryUri
