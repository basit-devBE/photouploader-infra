AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Photo Uploader - Security groups for the ALB, ECS tasks, and RDS,
  following least-privilege (each tier only accepts traffic from the tier
  in front of it).

Parameters:
  ProjectName:
    Type: String
    Default: photouploader

  VpcId:
    Type: AWS::EC2::VPC::Id

  AppContainerPort:
    Type: Number
    Default: 8080

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ALB - accepts HTTP from the internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-alb-sg
        - Key: Project
          Value: !Ref ProjectName

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks - accepts traffic from the ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppContainerPort
          ToPort: !Ref AppContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-ecs-sg
        - Key: Project
          Value: !Ref ProjectName

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL - accepts traffic from ECS tasks only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-rds-sg
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup

  EcsSecurityGroupId:
    Value: !Ref EcsSecurityGroup

  RdsSecurityGroupId:
    Value: !Ref RdsSecurityGroup
