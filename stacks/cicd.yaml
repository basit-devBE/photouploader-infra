AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Photo Uploader - Deployment pipeline: an S3 artifact bucket GitHub Actions
  writes deploy bundles to, a CodePipeline with an ECR image source and an
  S3 deploy-bundle source, a CodeDeploy blue/green deployment to ECS, and
  an EventBridge rule that starts the pipeline the moment a new image is
  pushed to ECR.

Parameters:
  ProjectName:
    Type: String
    Default: photouploader

  EcrRepositoryName:
    Type: String

  EcrRepositoryArn:
    Type: String

  ClusterName:
    Type: String

  ServiceName:
    Type: String

  AlbListenerArn:
    Type: String

  BlueTargetGroupName:
    Type: String

  GreenTargetGroupName:
    Type: String

  EcsTaskExecutionRoleArn:
    Type: String

  EcsTaskRoleArn:
    Type: String

  GitHubActionsRoleArn:
    Type: String

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-cicd-artifacts-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowGitHubActionsWriteDeployBundle
            Effect: Allow
            Principal:
              AWS: !Ref GitHubActionsRoleArn
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub ${ArtifactBucket.Arn}/deploy/*
          - Sid: AllowGitHubActionsGetBucketLocation
            Effect: Allow
            Principal:
              AWS: !Ref GitHubActionsRoleArn
            Action: s3:GetBucketLocation
            Resource: !GetAtt ArtifactBucket.Arn

  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codedeploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Policies:
        - PolicyName: PassEcsRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Ref EcsTaskExecutionRoleArn
                  - !Ref EcsTaskRoleArn
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codepipeline
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ArtifactBucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Sid: EcrRead
                Effect: Allow
                Action:
                  - ecr:DescribeImages
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !Ref EcrRepositoryArn
              - Sid: EcrAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: CodeDeployAccess
                Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                  - codedeploy:GetDeploymentGroup
                Resource:
                  - !Sub arn:aws:codedeploy:${AWS::Region}:${AWS::AccountId}:application:${CodeDeployApplication}
                  - !Sub arn:aws:codedeploy:${AWS::Region}:${AWS::AccountId}:deploymentgroup:${CodeDeployApplication}/*
                  - !Sub arn:aws:codedeploy:${AWS::Region}:${AWS::AccountId}:deploymentconfig:*
              - Sid: EcsTaskDefinitionAccess
                Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: '*'
              - Sid: PassEcsRoles
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Ref EcsTaskExecutionRoleArn
                  - !Ref EcsTaskRoleArn
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eventbridge
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipeline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-app
      ComputePlatform: ECS

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub ${ProjectName}-deployment-group
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
      ECSServices:
        - ClusterName: !Ref ClusterName
          ServiceName: !Ref ServiceName
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - ProdTrafficRoute:
              ListenerArns:
                - !Ref AlbListenerArn
            TargetGroups:
              - Name: !Ref BlueTargetGroupName
              - Name: !Ref GreenTargetGroupName

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: ECRSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: ECR
                Version: '1'
              Configuration:
                RepositoryName: !Ref EcrRepositoryName
                ImageTag: latest
              OutputArtifacts:
                - Name: ImageDetails
              RunOrder: 1
            - Name: S3Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: deploy/deploy-bundle.zip
                PollForSourceChanges: 'false'
              OutputArtifacts:
                - Name: DeployBundle
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              InputArtifacts:
                - Name: ImageDetails
                - Name: DeployBundle
              Configuration:
                ApplicationName: !Ref CodeDeployApplication
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
                TaskDefinitionTemplateArtifact: DeployBundle
                TaskDefinitionTemplatePath: taskdef.json
                AppSpecTemplateArtifact: DeployBundle
                AppSpecTemplatePath: appspec.yaml
                Image1ArtifactName: ImageDetails
                Image1ContainerName: IMAGE1_NAME
              RunOrder: 1

  EcrPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-ecr-push
      Description: Starts the pipeline when a new image is pushed to ECR
      EventPattern:
        source: [aws.ecr]
        detail-type: ['ECR Image Action']
        detail:
          action-type: [PUSH]
          result: [SUCCESS]
          repository-name: [!Ref EcrRepositoryName]
          image-tag: [latest]
      State: ENABLED
      Targets:
        - Id: PipelineTarget
          Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  PipelineName:
    Value: !Ref Pipeline

  ArtifactBucketName:
    Value: !Ref ArtifactBucket

  CodeDeployApplicationName:
    Value: !Ref CodeDeployApplication

  CodeDeployDeploymentGroupName:
    Value: !Ref CodeDeployDeploymentGroup
